<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <title>AFTERMAP 三种感染者对比</title>
  <desc>Three infected enemy types comparison: Wanderer (green), Restless (red), Lurker (purple), with HP/speed/special stats</desc>
  <rect x="0" y="0" width="800" height="400" fill="#1F2426"/>

  <!-- Title bar -->
  <rect x="40" y="24" width="720" height="40" fill="#1F2426"/>
  <rect x="40" y="24" width="720" height="8" fill="#C74A45"/>
  <rect x="40" y="56" width="720" height="8" fill="#C74A45"/>
  <text x="400" y="52" font-family="Courier New, monospace" font-size="20" fill="#D7A34B" text-anchor="middle" font-weight="bold">感染者图鉴 / INFECTED BESTIARY</text>

  <!-- ========= Column 1: Wanderer (游荡者) ========= -->
  <!-- Column box: 40-280 width=200, 80-380 -->
  <rect x="40" y="80" width="200" height="300" fill="#1F2426"/>
  <rect x="40" y="80" width="200" height="8" fill="#5B7B5C"/>
  <rect x="40" y="372" width="200" height="8" fill="#5B7B5C"/>
  <rect x="40" y="80" width="8" height="300" fill="#5B7B5C"/>
  <rect x="232" y="80" width="8" height="300" fill="#5B7B5C"/>

  <!-- Emoji and name -->
  <text x="140" y="128" font-family="Courier New, monospace" font-size="32" fill="#5B7B5C" text-anchor="middle">&#x1F9DF;</text>
  <text x="140" y="160" font-family="Courier New, monospace" font-size="18" fill="#E5E5E5" text-anchor="middle" font-weight="bold">游荡者</text>
  <text x="140" y="180" font-family="Courier New, monospace" font-size="12" fill="#5B7B5C" text-anchor="middle">WANDERER</text>

  <!-- Pixel sprite of wanderer (green) -->
  <rect x="120" y="200" width="40" height="56" fill="#5B7B5C"/>
  <rect x="128" y="208" width="24" height="16" fill="#1F2426"/>
  <rect x="132" y="212" width="6" height="6" fill="#C74A45"/>
  <rect x="146" y="212" width="6" height="6" fill="#C74A45"/>
  <rect x="120" y="224" width="40" height="16" fill="#3F6470"/>
  <rect x="120" y="240" width="16" height="16" fill="#3F6470"/>
  <rect x="144" y="240" width="16" height="16" fill="#3F6470"/>

  <!-- Stats -->
  <rect x="56" y="272" width="168" height="8" fill="#5B7B5C"/>
  <text x="140" y="300" font-family="Courier New, monospace" font-size="14" fill="#D7A34B" text-anchor="middle">HP 70</text>
  <text x="140" y="324" font-family="Courier New, monospace" font-size="14" fill="#D7A34B" text-anchor="middle">速度 1.6/秒</text>
  <text x="140" y="348" font-family="Courier New, monospace" font-size="14" fill="#E5E5E5" text-anchor="middle">巡逻/低警觉</text>

  <!-- ========= Column 2: Restless (躁行者) ========= -->
  <rect x="296" y="80" width="208" height="300" fill="#1F2426"/>
  <rect x="296" y="80" width="208" height="8" fill="#C74A45"/>
  <rect x="296" y="372" width="208" height="8" fill="#C74A45"/>
  <rect x="296" y="80" width="8" height="300" fill="#C74A45"/>
  <rect x="496" y="80" width="8" height="300" fill="#C74A45"/>

  <text x="400" y="128" font-family="Courier New, monospace" font-size="32" fill="#C74A45" text-anchor="middle">&#x1F9DF;</text>
  <text x="400" y="160" font-family="Courier New, monospace" font-size="18" fill="#E5E5E5" text-anchor="middle" font-weight="bold">躁行者</text>
  <text x="400" y="180" font-family="Courier New, monospace" font-size="12" fill="#C74A45" text-anchor="middle">RESTLESS</text>

  <!-- Pixel sprite of restless (red) - aggressive pose -->
  <rect x="376" y="200" width="48" height="56" fill="#C74A45"/>
  <rect x="384" y="208" width="32" height="16" fill="#1F2426"/>
  <rect x="388" y="212" width="8" height="8" fill="#D7A34B"/>
  <rect x="404" y="212" width="8" height="8" fill="#D7A34B"/>
  <rect x="376" y="224" width="48" height="16" fill="#8A5A43"/>
  <rect x="368" y="240" width="16" height="16" fill="#8A5A43"/>
  <rect x="416" y="240" width="16" height="16" fill="#8A5A43"/>
  <!-- Speed lines indicating sprint -->
  <rect x="360" y="208" width="8" height="8" fill="#D7A34B"/>
  <rect x="352" y="216" width="8" height="8" fill="#D7A34B"/>

  <rect x="312" y="272" width="176" height="8" fill="#C74A45"/>
  <text x="400" y="300" font-family="Courier New, monospace" font-size="14" fill="#D7A34B" text-anchor="middle">HP 65</text>
  <text x="400" y="324" font-family="Courier New, monospace" font-size="14" fill="#D7A34B" text-anchor="middle">速度 2.2/秒 冲刺 5.0</text>
  <text x="400" y="348" font-family="Courier New, monospace" font-size="14" fill="#E5E5E5" text-anchor="middle">高警觉/会冲刺</text>

  <!-- ========= Column 3: Lurker (伏听者) ========= -->
  <rect x="560" y="80" width="200" height="300" fill="#1F2426"/>
  <rect x="560" y="80" width="200" height="8" fill="#6B5C8A"/>
  <rect x="560" y="372" width="200" height="8" fill="#6B5C8A"/>
  <rect x="560" y="80" width="8" height="300" fill="#6B5C8A"/>
  <rect x="752" y="80" width="8" height="300" fill="#6B5C8A"/>

  <text x="660" y="128" font-family="Courier New, monospace" font-size="32" fill="#6B5C8A" text-anchor="middle">&#x1F9DF;</text>
  <text x="660" y="160" font-family="Courier New, monospace" font-size="18" fill="#E5E5E5" text-anchor="middle" font-weight="bold">伏听者</text>
  <text x="660" y="180" font-family="Courier New, monospace" font-size="12" fill="#6B5C8A" text-anchor="middle">LURKER</text>

  <!-- Pixel sprite of lurker (purple, hunched) -->
  <rect x="640" y="208" width="40" height="48" fill="#6B5C8A"/>
  <rect x="624" y="224" width="16" height="32" fill="#6B5C8A"/>
  <rect x="680" y="224" width="16" height="32" fill="#6B5C8A"/>
  <rect x="648" y="216" width="24" height="16" fill="#1F2426"/>
  <rect x="652" y="220" width="6" height="6" fill="#D7A34B"/>
  <rect x="662" y="220" width="6" height="6" fill="#D7A34B"/>
  <!-- Sound waves -->
  <rect x="696" y="232" width="8" height="2" fill="#D7A34B"/>
  <rect x="704" y="228" width="8" height="2" fill="#D7A34B"/>
  <rect x="712" y="224" width="8" height="2" fill="#D7A34B"/>

  <rect x="576" y="272" width="168" height="8" fill="#6B5C8A"/>
  <text x="660" y="300" font-family="Courier New, monospace" font-size="14" fill="#D7A34B" text-anchor="middle">HP 55</text>
  <text x="660" y="324" font-family="Courier New, monospace" font-size="14" fill="#D7A34B" text-anchor="middle">速度 1.4/秒</text>
  <text x="660" y="348" font-family="Courier New, monospace" font-size="14" fill="#E5E5E5" text-anchor="middle">听觉强/伏击</text>
</svg>
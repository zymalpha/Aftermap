<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <title>AFTERMAP 循环 - 30 天战役循环</title>
  <desc>Pixel art loop diagram showing 4 phases: base to outing to combat/explore to nightly settlement, centered on 30-day campaign</desc>
  <rect x="0" y="0" width="800" height="300" fill="#1F2426"/>

  <!-- Central title box -->
  <rect x="296" y="120" width="208" height="64" fill="#1F2426"/>
  <rect x="296" y="120" width="208" height="8" fill="#D7A34B"/>
  <rect x="296" y="176" width="208" height="8" fill="#D7A34B"/>
  <rect x="296" y="120" width="8" height="64" fill="#D7A34B"/>
  <rect x="496" y="120" width="8" height="64" fill="#D7A34B"/>
  <text x="400" y="156" font-family="Courier New, monospace" font-size="20" fill="#D7A34B" text-anchor="middle" font-weight="bold">30 天战役</text>
  <text x="400" y="176" font-family="Courier New, monospace" font-size="14" fill="#E5E5E5" text-anchor="middle">CAMPAIGN</text>

  <!-- Arrow paths around the cycle (using rect blocks) -->
  <!-- Top arrow: from right of central box to top-right block -->
  <rect x="504" y="104" width="48" height="8" fill="#707578"/>
  <rect x="552" y="96" width="8" height="16" fill="#707578"/>
  <rect x="560" y="88" width="8" height="24" fill="#707578"/>

  <!-- Right arrow: down from top-right block to bottom-right block -->
  <rect x="608" y="112" width="8" height="80" fill="#707578"/>
  <rect x="600" y="184" width="24" height="8" fill="#707578"/>
  <rect x="592" y="192" width="24" height="8" fill="#707578"/>

  <!-- Bottom arrow: from bottom-right to bottom-left -->
  <rect x="240" y="216" width="360" height="8" fill="#707578"/>
  <rect x="232" y="200" width="16" height="24" fill="#707578"/>
  <rect x="216" y="192" width="24" height="16" fill="#707578"/>

  <!-- Left arrow: from bottom-left to top-left -->
  <rect x="184" y="112" width="8" height="80" fill="#707578"/>
  <rect x="184" y="104" width="16" height="16" fill="#707578"/>
  <rect x="176" y="96" width="24" height="16" fill="#707578"/>

  <!-- Top arrow: from top-left to central -->
  <rect x="216" y="88" width="80" height="8" fill="#707578"/>

  <!-- Block 1: Top-left - Base (基地) -->
  <rect x="40" y="32" width="136" height="96" fill="#1F2426"/>
  <rect x="40" y="32" width="136" height="8" fill="#77A88D"/>
  <rect x="40" y="120" width="136" height="8" fill="#77A88D"/>
  <rect x="40" y="32" width="8" height="96" fill="#77A88D"/>
  <rect x="168" y="32" width="8" height="96" fill="#77A88D"/>
  <rect x="56" y="56" width="32" height="32" fill="#77A88D"/>
  <rect x="56" y="56" width="8" height="32" fill="#8A5A43"/>
  <rect x="80" y="56" width="8" height="32" fill="#8A5A43"/>
  <text x="108" y="64" font-family="Courier New, monospace" font-size="16" fill="#D7A34B" text-anchor="middle">&#x1F3E0;</text>
  <text x="108" y="100" font-family="Courier New, monospace" font-size="14" fill="#E5E5E5" text-anchor="middle">基地</text>

  <!-- Block 2: Top-right - Outing (外出) -->
  <rect x="624" y="32" width="136" height="96" fill="#1F2426"/>
  <rect x="624" y="32" width="136" height="8" fill="#D7A34B"/>
  <rect x="624" y="120" width="136" height="8" fill="#D7A34B"/>
  <rect x="624" y="32" width="8" height="96" fill="#D7A34B"/>
  <rect x="752" y="32" width="8" height="96" fill="#D7A34B"/>
  <rect x="640" y="56" width="32" height="32" fill="#8A5A43"/>
  <rect x="664" y="64" width="8" height="16" fill="#C5A47E"/>
  <text x="692" y="64" font-family="Courier New, monospace" font-size="16" fill="#D7A34B" text-anchor="middle">&#x1F5FA;</text>
  <text x="692" y="100" font-family="Courier New, monospace" font-size="14" fill="#E5E5E5" text-anchor="middle">外出</text>

  <!-- Block 3: Bottom-right - Combat/Explore -->
  <rect x="624" y="200" width="136" height="96" fill="#1F2426"/>
  <rect x="624" y="200" width="136" height="8" fill="#C74A45"/>
  <rect x="624" y="288" width="136" height="8" fill="#C74A45"/>
  <rect x="624" y="200" width="8" height="96" fill="#C74A45"/>
  <rect x="752" y="200" width="8" height="96" fill="#C74A45"/>
  <rect x="640" y="224" width="16" height="16" fill="#5B7B5C"/>
  <rect x="664" y="232" width="16" height="16" fill="#C74A45"/>
  <rect x="688" y="240" width="16" height="16" fill="#6B5C8A"/>
  <text x="712" y="232" font-family="Courier New, monospace" font-size="16" fill="#D7A34B" text-anchor="middle">&#x2694;</text>
  <text x="692" y="268" font-family="Courier New, monospace" font-size="14" fill="#E5E5E5" text-anchor="middle">探索战斗</text>

  <!-- Block 4: Bottom-left - Nightly Settlement -->
  <rect x="40" y="200" width="136" height="96" fill="#1F2426"/>
  <rect x="40" y="200" width="136" height="8" fill="#3F6470"/>
  <rect x="40" y="288" width="136" height="8" fill="#3F6470"/>
  <rect x="40" y="200" width="8" height="96" fill="#3F6470"/>
  <rect x="168" y="200" width="8" height="96" fill="#3F6470"/>
  <rect x="56" y="224" width="40" height="24" fill="#3F6470"/>
  <rect x="72" y="232" width="8" height="8" fill="#D7A34B"/>
  <rect x="84" y="232" width="8" height="8" fill="#D7A34B"/>
  <rect x="96" y="232" width="8" height="8" fill="#D7A34B"/>
  <text x="120" y="240" font-family="Courier New, monospace" font-size="14" fill="#D7A34B" text-anchor="middle">&#x1F319;</text>
  <text x="108" y="268" font-family="Courier New, monospace" font-size="14" fill="#E5E5E5" text-anchor="middle">夜间结算</text>
</svg>
<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320">
  <title>AFTERMAP 30 天时间线 - 四幕剧情</title>
  <desc>30-day timeline showing 4 acts: Act 1 establish (days 1-7), Act 2 cracks (days 8-18), Act 3 exit window (days 19-27), Finale (days 28-30)</desc>
  <rect x="0" y="0" width="1280" height="320" fill="#1F2426"/>

  <!-- Title bar -->
  <rect x="40" y="16" width="1200" height="40" fill="#1F2426"/>
  <rect x="40" y="16" width="1200" height="8" fill="#D7A34B"/>
  <rect x="40" y="48" width="1200" height="8" fill="#D7A34B"/>
  <text x="640" y="44" font-family="Courier New, monospace" font-size="20" fill="#D7A34B" text-anchor="middle" font-weight="bold">30 天战役时间线 / 30-DAY CAMPAIGN TIMELINE</text>

  <!-- Timeline axis at y=120, x=80 to x=1200 (width 1120) -->
  <!-- 30 cells: each 1120/30 = 37.33 ... use 40px width scaled; better: 30 cells of 36px = 1080, with 40px margin -->
  <!-- Use 30 cells of 36px = 1080 total, starting at x=100 -->
  <!-- Actually let's use: 30 cells each 32px = 960px, x=160 to x=1120 -->
  <rect x="100" y="120" width="1080" height="2" fill="#707578"/>
  <rect x="100" y="116" width="1080" height="8" fill="#707578"/>
  <rect x="100" y="124" width="1080" height="2" fill="#707578"/>

  <!-- Day tick marks (every day, 30 ticks, 36px apart) -->
  <!-- Act 1: days 1-7 (7 days, 7*36=252px) -->
  <rect x="100" y="100" width="252" height="24" fill="#77A88D"/>
  <!-- Day separator ticks for Act 1 -->
  <rect x="100" y="92" width="2" height="48" fill="#77A88D"/>
  <rect x="136" y="120" width="2" height="8" fill="#1F2426"/>
  <rect x="172" y="120" width="2" height="8" fill="#1F2426"/>
  <rect x="208" y="120" width="2" height="8" fill="#1F2426"/>
  <rect x="244" y="120" width="2" height="8" fill="#1F2426"/>
  <rect x="280" y="120" width="2" height="8" fill="#1F2426"/>
  <rect x="316" y="120" width="2" height="8" fill="#1F2426"/>
  <rect x="352" y="92" width="2" height="48" fill="#D7A34B"/>

  <!-- Act 2: days 8-18 (11 days, 11*36=396px) -->
  <rect x="352" y="100" width="396" height="24" fill="#D7A34B"/>
  <rect x="388" y="120" width="2" height="8" fill="#1F2426"/>
  <rect x="424" y="120" width="2" height="8" fill="#1F2426"/>
  <rect x="460" y="120" width="2" height="8" fill="#1F2426"/>
  <rect x="496" y="120" width="2" height="8" fill="#1F2426"/>
  <rect x="532" y="120" width="2" height="8" fill="#1F2426"/>
  <rect x="568" y="120" width="2" height="8" fill="#1F2426"/>
  <rect x="604" y="120" width="2" height="8" fill="#1F2426"/>
  <rect x="640" y="120" width="2" height="8" fill="#1F2426"/>
  <rect x="676" y="120" width="2" height="8" fill="#1F2426"/>
  <rect x="712" y="120" width="2" height="8" fill="#1F2426"/>
  <rect x="748" y="92" width="2" height="48" fill="#C74A45"/>

  <!-- Act 3: days 19-27 (9 days, 9*36=324px) -->
  <rect x="748" y="100" width="324" height="24" fill="#C74A45"/>
  <rect x="784" y="120" width="2" height="8" fill="#1F2426"/>
  <rect x="820" y="120" width="2" height="8" fill="#1F2426"/>
  <rect x="856" y="120" width="2" height="8" fill="#1F2426"/>
  <rect x="892" y="120" width="2" height="8" fill="#1F2426"/>
  <rect x="928" y="120" width="2" height="8" fill="#1F2426"/>
  <rect x="964" y="120" width="2" height="8" fill="#1F2426"/>
  <rect x="1000" y="120" width="2" height="8" fill="#1F2426"/>
  <rect x="1036" y="120" width="2" height="8" fill="#1F2426"/>
  <rect x="1072" y="92" width="2" height="48" fill="#8A5A43"/>

  <!-- Act 4: days 28-30 (3 days, 3*36=108px) -->
  <rect x="1072" y="100" width="108" height="24" fill="#8A5A43"/>
  <rect x="1108" y="120" width="2" height="8" fill="#1F2426"/>
  <rect x="1144" y="120" width="2" height="8" fill="#1F2426"/>
  <rect x="1180" y="92" width="2" height="48" fill="#E5E5E5"/>

  <!-- Day numbers every 5 days -->
  <text x="100" y="156" font-family="Courier New, monospace" font-size="10" fill="#E5E5E5" text-anchor="middle">1</text>
  <text x="244" y="156" font-family="Courier New, monospace" font-size="10" fill="#E5E5E5" text-anchor="middle">5</text>
  <text x="424" y="156" font-family="Courier New, monospace" font-size="10" fill="#E5E5E5" text-anchor="middle">10</text>
  <text x="604" y="156" font-family="Courier New, monospace" font-size="10" fill="#E5E5E5" text-anchor="middle">15</text>
  <text x="784" y="156" font-family="Courier New, monospace" font-size="10" fill="#E5E5E5" text-anchor="middle">20</text>
  <text x="964" y="156" font-family="Courier New, monospace" font-size="10" fill="#E5E5E5" text-anchor="middle">25</text>
  <text x="1144" y="156" font-family="Courier New, monospace" font-size="10" fill="#E5E5E5" text-anchor="middle">30</text>

  <!-- ====== Act labels and questions ====== -->

  <!-- Act 1 label box -->
  <rect x="100" y="180" width="252" height="120" fill="#1F2426"/>
  <rect x="100" y="180" width="252" height="8" fill="#77A88D"/>
  <rect x="100" y="292" width="252" height="8" fill="#77A88D"/>
  <text x="226" y="216" font-family="Courier New, monospace" font-size="16" fill="#77A88D" text-anchor="middle" font-weight="bold">第一幕</text>
  <text x="226" y="236" font-family="Courier New, monospace" font-size="14" fill="#E5E5E5" text-anchor="middle">建立坐标</text>
  <text x="226" y="256" font-family="Courier New, monospace" font-size="11" fill="#D7A34B" text-anchor="middle">Days 1-7</text>
  <rect x="116" y="266" width="220" height="1" fill="#77A88D"/>
  <text x="226" y="280" font-family="Courier New, monospace" font-size="11" fill="#E5E5E5" text-anchor="middle">谁留下?</text>

  <!-- Act 2 label box -->
  <rect x="352" y="180" width="396" height="120" fill="#1F2426"/>
  <rect x="352" y="180" width="396" height="8" fill="#D7A34B"/>
  <rect x="352" y="292" width="396" height="8" fill="#D7A34B"/>
  <text x="550" y="216" font-family="Courier New, monospace" font-size="16" fill="#D7A34B" text-anchor="middle" font-weight="bold">第二幕</text>
  <text x="550" y="236" font-family="Courier New, monospace" font-size="14" fill="#E5E5E5" text-anchor="middle">裂缝</text>
  <text x="550" y="256" font-family="Courier New, monospace" font-size="11" fill="#D7A34B" text-anchor="middle">Days 8-18</text>
  <rect x="368" y="266" width="364" height="1" fill="#D7A34B"/>
  <text x="550" y="280" font-family="Courier New, monospace" font-size="11" fill="#E5E5E5" text-anchor="middle">谁动摇? 你付出什么代价?</text>

  <!-- Act 3 label box -->
  <rect x="748" y="180" width="324" height="120" fill="#1F2426"/>
  <rect x="748" y="180" width="324" height="8" fill="#C74A45"/>
  <rect x="748" y="292" width="324" height="8" fill="#C74A45"/>
  <text x="910" y="216" font-family="Courier New, monospace" font-size="16" fill="#C74A45" text-anchor="middle" font-weight="bold">第三幕</text>
  <text x="910" y="236" font-family="Courier New, monospace" font-size="14" fill="#E5E5E5" text-anchor="middle">离城窗口</text>
  <text x="910" y="256" font-family="Courier New, monospace" font-size="11" fill="#D7A34B" text-anchor="middle">Days 19-27</text>
  <rect x="764" y="266" width="292" height="1" fill="#C74A45"/>
  <text x="910" y="280" font-family="Courier New, monospace" font-size="11" fill="#E5E5E5" text-anchor="middle">走还是留? 谁能走?</text>

  <!-- Act 4 label box -->
  <rect x="1072" y="180" width="108" height="120" fill="#1F2426"/>
  <rect x="1072" y="180" width="108" height="8" fill="#8A5A43"/>
  <rect x="1072" y="292" width="108" height="8" fill="#8A5A43"/>
  <text x="1126" y="216" font-family="Courier New, monospace" font-size="14" fill="#8A5A43" text-anchor="middle" font-weight="bold">终幕</text>
  <text x="1126" y="234" font-family="Courier New, monospace" font-size="12" fill="#E5E5E5" text-anchor="middle">最后一夜</text>
  <text x="1126" y="256" font-family="Courier New, monospace" font-size="11" fill="#D7A34B" text-anchor="middle">D 28-30</text>
  <rect x="1080" y="266" width="92" height="1" fill="#8A5A43"/>
  <text x="1126" y="280" font-family="Courier New, monospace" font-size="10" fill="#E5E5E5" text-anchor="middle">告别</text>

  <!-- Footer -->
  <rect x="40" y="304" width="1200" height="1" fill="#707578"/>
</svg>
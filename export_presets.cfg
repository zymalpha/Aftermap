; export_presets.cfg — Aftermap (Godot 4.6.2) Windows Desktop export preset.
;
; Generated for the v1.0 release. The preset targets 64-bit Windows Desktop
; with all resources bundled into a single PCK-backed executable.
;
; Product: Aftermap
; Company: zymalpha
; Icon: res://game/assets_art/ui/icon.ico (placeholder — falls back to the
;       engine default when the file is absent).
;
; Usage (headless export — see tools/build/build_windows.sh):
;   godot --headless --export-release "Windows Desktop" build/windows/Aftermap.exe

[preset.0]

name="Windows Desktop"
platform="Windows Desktop"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
export_files={}
include_filter=""
exclude_filter=""
export_path="build/windows/Aftermap.exe"
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

[preset.0.options]

custom_template_debug=""
custom_template_release=""
debug/export_console_wrapper=1
binary_format/embed_pck=true
texture_format/bptc=true
texture_format/s3tc=true
binary_format/architecture="x86_64"
codesign/enable=false
application/modify_resources=true
application/icon="res://game/assets_art/ui/icon.ico"
application/console_wrapper_icon=""
application/icon_interpolation=4
application/file_version="1.0.0.0"
application/product_version="1.0.0.0"
application/company_name="zymalpha"
application/product_name="Aftermap"
application/file_description="Aftermap — 2D pixel post-apocalyptic survival management"
application/copyright="Copyright (c) 2026 zymalpha"
application/trademarks=""
application/export_angle=0
ssh_remote_deploy/enabled=false
windows_subsystem_for_linux/enabled=false
